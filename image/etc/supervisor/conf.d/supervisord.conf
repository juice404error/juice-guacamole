[supervisord]
nodaemon=true
user=root
logfile=/config/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:bootstrap]
; Először lefut a jogosultságok javítása és a fájlok másolása
command=/etc/firstrun/firstrun.sh
priority=1
autorestart=false
startsecs=0
stdout_logfile=/config/log/bootstrap.log
stderr_logfile=/config/log/bootstrap.log

[program:mariadb]
; Az adatbázis csak a bootstrap után induljon
command=/etc/firstrun/mariadb.sh
priority=10
user=abc
stdout_logfile=/config/log/mariadb.log
stderr_logfile=/config/log/mariadb.log
autorestart=true
startsecs=5

[program:guacd]
; A Guacamole proxy daemon
command=/opt/guacamole/sbin/guacd -b 0.0.0.0 -L %(ENV_GUACD_LOG_LEVEL)s -f
priority=20
user=abc
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:tomcat]
; A Tomcat induljon legutoljára, amikor már van DB és guacd
command=/etc/firstrun/tomcat-wrapper.sh
priority=30
user=abc
stdout_logfile=/config/log/tomcat.log
stderr_logfile=/config/log/tomcat.log
autorestart=true
startsecs=10
