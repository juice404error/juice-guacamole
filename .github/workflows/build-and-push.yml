name: Auto Update Guacamole Version

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest Guacamole version
        id: guac-version
        run: |
          LATEST_VERSION=$(curl -s "https://hub.docker.com/v2/repositories/guacamole/guacamole/tags/?page_size=100" | \
            jq -r '.results[].name' | \
            grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | \
            sort -V | \
            tail -n 1)
          echo "latest_version=${LATEST_VERSION}" >> $GITHUB_OUTPUT

      - name: Get current version from Dockerfile
        id: current-version
        run: |
          CURRENT_VERSION=$(grep '^ARG GUAC_VER=' Dockerfile | cut -d'=' -f2 || echo "0.0.0")
          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT

      - name: Update Dockerfile version
        if: steps.guac-version.outputs.latest_version != steps.current-version.outputs.current_version
        run: |
          LATEST="${{ steps.guac-version.outputs.latest_version }}"
          sed -i "s/^ARG GUAC_VER=.*/ARG GUAC_VER=${LATEST}/" Dockerfile

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.guac-version.outputs.latest_version }}
          build-args: |
            GUAC_VER=${{ steps.guac-version.outputs.latest_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit and Push changes
        if: steps.guac-version.outputs.latest_version != steps.current-version.outputs.current_version
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Dockerfile
          git commit -m "Automated update to Guacamole ${{ steps.guac-version.outputs.latest_version }}"
          git push
